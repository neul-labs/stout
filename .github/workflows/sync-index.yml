name: Sync Index

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Full rebuild (ignore incremental)'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    name: Sync Index
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run sync
        working-directory: scripts
        run: |
          uv run sync.py --output ../dist ${{ github.event.inputs.full_rebuild == 'true' && '--full' || '' }}

      - name: Show results
        run: |
          echo "=== Manifest ==="
          cat dist/manifest.json
          echo ""
          echo "=== File sizes ==="
          ls -lh dist/
          echo ""
          echo "=== Formula count ==="
          ls dist/formulas/*/ | wc -l

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brewx-index
          path: |
            dist/index.db.zst
            dist/manifest.json
            dist/formulas/

      # For the brewx-index repository, commit and push
